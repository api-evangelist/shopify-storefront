specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Shopify Storefront API
providerId: shopify-storefront
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Commerce
  - Ecommerce
  - Headless
  - GraphQL
  - Storefront
  - Rate Limiting
description: Shopify documents that the Storefront API has no rate limits applied on the number of
  requests. Suspicious traffic can be rejected with 430, and there is a per-minute checkout creation
  throttle that returns a 200-with-Throttled error when exceeded.
sources:
  - https://shopify.dev/docs/api/usage/rate-limits
responseCodes:
  securityRejection: 430
  checkoutThrottled: 200
limits:
  - name: Storefront API requests
    scope: shop
    metric: requests
    limit: no published rate limit
    notes: Shopify states there are no rate limits applied on the number of requests that can be made
      to the Storefront API.
  - name: Checkout creation throttle
    scope: shop
    metric: checkouts_per_minute
    limit: see docs
    timeFrame: minute
    notes: A throttle exists on checkouts created per minute; exceeding it returns a 200 response with
      a "Throttled" error.
  - name: Security rejection
    scope: client
    metric: requests
    limit: see docs
    notes: Suspicious traffic patterns can be rejected with HTTP 430 Shopify Security Rejection.
policies:
  - name: No Per-Request Rate Limit
    description: Storefront API does not enforce a published per-second or per-minute request rate
      ceiling; clients should still implement reasonable client-side throttling and caching.
  - name: Checkout-Specific Throttling
    description: Checkout-creation traffic is throttled separately from product/cart reads. Retry on
      the next bucket window when a Throttled error is received.
  - name: Security Posture
    description: Bot-like or abusive request patterns may be rejected with 430. Identify clients with
      a unique user agent and respect Retry-After when present.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
