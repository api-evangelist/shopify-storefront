specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Shopify Storefront API
providerId: shopify-storefront
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Commerce
  - Ecommerce
  - Headless
  - GraphQL
  - Storefront
description: The Shopify Storefront API is bundled with every Shopify commerce subscription and has
  no separate API SKU and no published per-call rate limits. Cost surfaces are the underlying commerce
  plan (Basic, Grow, Advanced, Plus, Enterprise) and standard payment processing fees applied to orders
  placed via the Storefront.
sources:
  - https://www.shopify.com/pricing
  - https://shopify.dev/docs/api/usage/rate-limits
plans:
  - id: shopify-storefront-basic
    name: Basic
    type: subscription
    description: Storefront API access included with the Basic commerce plan.
    entries:
      - label: Subscription
        name: subscription
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: '$29/month (billed yearly)'
        userMultiplied: false
      - label: Online card rate
        name: card_online
        type: metered
        metric: transaction
        limit: -1
        timeFrame: usage
        geo: US
        unit: 1
        price: '2.9% + 30¢'
        userMultiplied: false
    elements:
      - name: Shopify Storefront API
      - name: Shopify Hydrogen
      - name: Shopify Buy SDK
