specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Shopify Storefront API
providerId: shopify-storefront
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Commerce
  - Ecommerce
  - Headless
  - GraphQL
  - FinOps
  - FOCUS
description: FOCUS-aligned FinOps for the Shopify Storefront API. The Storefront API has no per-call
  fees and no published rate limits; cost flows through the merchant's commerce subscription and the
  payment processing fees on orders that flow through the Storefront-built checkout.
sources:
  - https://www.shopify.com/pricing
  - https://shopify.dev/docs/api/usage/rate-limits
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Shopify Inc.
serviceCategory: Commerce
billingModel:
  pricingCategory: Subscription + Take Rate
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Tax
    - Adjustment
focusColumns:
  ServiceName: Shopify Storefront API
  ServiceCategory: Commerce
  ProviderName: Shopify
  PublisherName: Shopify Inc.
  InvoiceIssuerName: Shopify Inc.
  BillingCurrency: USD
meters:
  - name: commerce_subscription
    description: Monthly commerce plan fee that includes Storefront API entitlement.
    unit: month
    aggregation: sum
    dimensions:
      - plan
      - billing_term
  - name: card_transactions
    description: Payment processing fees on orders placed through the Storefront-driven checkout.
    unit: transaction
    aggregation: sum
    dimensions:
      - plan
      - channel
      - card_brand
      - region
  - name: third_party_payment_fee
    description: Per-transaction surcharge applied when using a non-Shopify payment provider.
    unit: transaction
    aggregation: sum
    dimensions:
      - plan
      - provider
  - name: storefront_requests
    description: Storefront API requests; not billed per call but useful as a capacity and abuse-detection
      meter for headless deployments.
    unit: request
    aggregation: sum
    dimensions:
      - shop
      - operation
principles:
  - name: Visibility
    description: Subscription, processing fees, and refunds appear on the Shopify monthly invoice and
      Shopify Payments balance reports. Storefront request counts are observable through the consumer's
      own client/CDN telemetry, not a Shopify-billed line.
  - name: Allocation
    description: Allocate by myshopify domain and channel (Hydrogen storefront, custom headless, Buy
      SDK embed); attribute card-fee spend to the originating storefront.
  - name: Optimization
    description: Cache GraphQL responses at the edge (Hydrogen / Oxygen / CDN) to reduce origin load,
      and choose the commerce plan that matches transaction volume rather than over-paying for Plus
      when API throughput is unconstrained.
  - name: Accountability
    description: Commerce/finance owns subscription and processing-fee spend; engineering owns Storefront
      request behavior, security signals (430), and checkout throttle handling.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
